<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Guess The Number</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h2>Number Guessing Game</h2>
        <p>Try and guess a random number between 1 and 100</p>
        <p>You have 10 attempts to guess the right number</p>
        <br>

        <form>
            <label style="font-size: 45px;"><b>Guess a number:</b></label><br><br>
            <input type="text" id="guessField" class="guessField"><br><br>
            <input type="submit" id="subt" class="guessSubmit" value="Submit Guess">
        </form>

        <div class="resultParas">
            <p>Previous Guesses: <span class="guesses"></span></p>
            <p>Guesses Remaining: <span class="lastResult">10</span></p>
            <div class="lowOrHi"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
